<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MediCore — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#060d1f;--ink2:#0d1829;--ink3:#1a2540;--sky:#0ea5e9;--teal:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--text:#e8f4ff;--t2:#94a3b8;--t3:#475569;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.08);}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--text);min-height:100vh;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(14,165,233,.12),transparent);}
.login-box{background:var(--ink2);border:1px solid var(--border2);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo-ico{width:60px;height:60px;background:linear-gradient(135deg,var(--sky),var(--teal));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
.login-logo h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.login-logo p{font-size:12px;color:var(--t2);margin-top:4px;}
.fld{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:9px;padding:11px 13px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;margin-bottom:12px;outline:none;transition:.15s;}
.fld:focus{border-color:var(--sky);}
.lbl{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--sky),var(--teal));border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;touch-action:manipulation;}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px;font-size:12px;color:#fca5a5;margin-bottom:12px;display:none;}
/* ADMIN APP */
#app{display:none;}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,13,31,.95);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);}
.top-brand{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.top-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--sky),var(--teal));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.top-right{display:flex;align-items:center;gap:10px;}
.admin-badge{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#c4b5fd;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;}
.btn-logout{background:var(--glass2);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:12px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.main{padding:72px 16px 32px;}
/* TABS */
.tabs{display:flex;gap:4px;overflow-x:auto;padding:16px 0 8px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--glass);color:var(--t2);transition:.15s;touch-action:manipulation;white-space:nowrap;}
.tab.active{background:linear-gradient(135deg,var(--sky),var(--teal));color:#fff;border-color:transparent;}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.sc{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px;}
.sc-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;}
.sc-lbl{font-size:11px;color:var(--t3);margin-top:2px;}
.sc.sky .sc-val{color:var(--sky);}
.sc.gr .sc-val{color:var(--green);}
.sc.or .sc-val{color:var(--amber);}
.sc.pu .sc-val{color:var(--purple);}
/* TABLE */
.tw{background:var(--glass);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.tw-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tw-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.tw-body{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:8px 12px;text-align:left;color:var(--t3);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px;border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border:none;}
/* BADGE */
.badge{display:inline-block;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:700;}
.badge.green{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3);}
.badge.orange{background:rgba(245,158,11,.15);color:#fcd34d;border:1px solid rgba(245,158,11,.3);}
.badge.red{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
.badge.blue{background:rgba(14,165,233,.15);color:#7dd3fc;border:1px solid rgba(14,165,233,.3);}
.badge.purple{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);}
/* BUTTONS */
.bs{border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;touch-action:manipulation;}
.bs.gr{background:rgba(16,185,129,.15);color:#6ee7b7;}
.bs.re{background:rgba(239,68,68,.15);color:#fca5a5;}
.bs.or{background:rgba(245,158,11,.15);color:#fcd34d;}
.bs.bl{background:rgba(14,165,233,.15);color:#7dd3fc;}
/* SEARCH */
.srch{background:var(--glass);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:100%;max-width:240px;}
.srch:focus{border-color:var(--sky);}
/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;z-index:9999;transition:.3s;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
.ld{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--t3);}
.sp{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* MODAL */
.m-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center;padding:16px;}
.m-overlay.open{display:flex;}
.m-box{background:var(--ink2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:420px;overflow:hidden;}
.m-head{background:linear-gradient(135deg,var(--sky),var(--teal));padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.m-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff;}
.m-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;}
.m-body{padding:16px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-ico">🛡️</div>
      <h2>Super Admin</h2>
      <p>MediCore SaaS Control Panel</p>
    </div>
    <div class="err" id="login-err"></div>
    <label class="lbl">Email</label>
    <input id="sa-email" class="fld" type="email" placeholder="admin@medicore.in">
    <label class="lbl">Password</label>
    <input id="sa-pass" class="fld" type="password" placeholder="Password">
    <button class="btn-primary" onclick="doAdminLogin()">🔑 Sign In</button>
  </div>
</div>

<!-- ADMIN APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-brand"><div class="top-logo">🛡️</div>MediCore Admin</div>
    <div class="top-right">
      <span class="admin-badge">Super Admin</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="showTab('dashboard',this)">📊 Dashboard</button>
      <button class="tab" onclick="showTab('hospitals',this)">🏥 Hospitals</button>
      <button class="tab" onclick="showTab('subscriptions',this)">💳 Subscriptions</button>
      <button class="tab" onclick="showTab('trials',this)">⏳ Trials</button>
      <button class="tab" onclick="showTab('revenue',this)">💰 Revenue</button>
    </div>
    <div id="tab-content">
      <div class="ld"><div class="sp"></div></div>
    </div>
  </div>
</div>

<div id="toast">✅ Done</div>

<script>
var API = 'https://web-production-d347.up.railway.app/api';
var SA_TOKEN = null;
var allHospitals = [];

function toast(msg, type){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='e' ? '#450a0a' : type==='w' ? '#451a03' : '#0f172a';
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2800);
}

function doAdminLogin(){
  var email = document.getElementById('sa-email').value.trim();
  var pass  = document.getElementById('sa-pass').value;
  var err   = document.getElementById('login-err');
  err.style.display = 'none';
  if(!email||!pass){err.textContent='Email and password required';err.style.display='block';return;}
  fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pass})})
  .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.error||'Login failed');return d;});})
  .then(function(res){
    if(res.user.role !== 'super_admin'){err.textContent='Access denied. Super Admin only.';err.style.display='block';return;}
    SA_TOKEN = res.token;
    try{localStorage.setItem('sa_token',SA_TOKEN);}catch(x){}
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    showTab('dashboard');
  })
  .catch(function(e){err.textContent=e.message;err.style.display='block';});
}

function doLogout(){
  SA_TOKEN = null;
  try{localStorage.removeItem('sa_token');}catch(x){}
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function authHeader(){return {'Content-Type':'application/json','Authorization':'Bearer '+SA_TOKEN};}

function showTab(name, btn){
  if(btn){
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    btn.classList.add('active');
  }
  var el = document.getElementById('tab-content');
  el.innerHTML = '<div class="ld"><div class="sp"></div></div>';
  if(name==='dashboard') loadDashboard();
  else if(name==='hospitals') loadHospitals();
  else if(name==='subscriptions') loadSubscriptions();
  else if(name==='trials') loadTrials();
  else if(name==='revenue') loadRevenue();
}

function loadDashboard(){
  fetch(API+'/hospitals/all',{headers:authHeader()})
  .then(function(r){return r.json();})
  .then(function(res){
    var hospitals = res.hospitals||[];
    allHospitals = hospitals;
    var active = hospitals.filter(function(h){return h.subscriptionStatus==='active';}).length;
    var trial  = hospitals.filter(function(h){return h.subscriptionStatus==='trial';}).length;
    var expired= hospitals.filter(function(h){return h.subscriptionStatus==='expired'||h.subscriptionStatus==='suspended';}).length;
    var mrr = hospitals.filter(function(h){return h.subscriptionStatus==='active';}).reduce(function(s,h){
      var planPrice = {basic:999,pro:2499,enterprise:4999};
      return s+(planPrice[h.plan]||0);
    },0);
    document.getElementById('tab-content').innerHTML =
      '<div class="sg" style="grid-template-columns:repeat(2,1fr)">' +
        '<div class="sc sky"><div class="sc-val">'+hospitals.length+'</div><div class="sc-lbl">Total Hospitals</div></div>'+
        '<div class="sc gr"><div class="sc-val">'+active+'</div><div class="sc-lbl">Active Paid</div></div>'+
        '<div class="sc or"><div class="sc-val">'+trial+'</div><div class="sc-lbl">On Trial</div></div>'+
        '<div class="sc pu"><div class="sc-val">₹'+mrr.toLocaleString('en-IN')+'</div><div class="sc-lbl">Monthly Revenue</div></div>'+
      '</div>'+
      '<div class="tw"><div class="tw-head"><span class="tw-title">Recent Hospitals</span></div>'+
      '<div class="tw-body"><table><thead><tr><th>Hospital</th><th>Plan</th><th>Status</th><th>Joined</th></tr></thead><tbody>'+
      hospitals.slice(0,10).map(function(h){
        var st=h.subscriptionStatus||'trial';
        var bc=st==='active'?'green':st==='trial'?'orange':st==='suspended'?'red':'blue';
        return '<tr><td><strong>'+esc(h.name||h.hospitalName||'-')+'</strong><br><span style="font-size:10px;color:var(--t3)">'+esc(h.adminEmail||'-')+'</span></td>'+
          '<td><span class="badge blue">'+esc(h.plan||'trial')+'</span></td>'+
          '<td><span class="badge '+bc+'">'+st+'</span></td>'+
          '<td style="font-size:11px">'+fdate(h.createdAt)+'</td></tr>';
      }).join('')+
      '</tbody></table></div></div>';
  }).catch(function(e){document.getElementById('tab-content').innerHTML='<div class="ld" style="color:var(--red)">❌ '+e.message+'</div>';});
}

function loadHospitals(){
  fetch(API+'/hospitals/all',{headers:authHeader()})
  .then(function(r){return r.json();})
  .then(function(res){
    allHospitals = res.hospitals||[];
    renderHospitals(allHospitals);
  }).catch(function(e){document.getElementById('tab-content').innerHTML='<div class="ld" style="color:var(--red)">❌ '+e.message+'</div>';});
}

function renderHospitals(hospitals){
  var html = '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
    '<input class="srch" placeholder="Search hospital..." oninput="filterHospitals(this.value)" style="max-width:100%;flex:1">'+
    '<select onchange="filterByStatus(this.value)" style="background:var(--glass);border:1px solid var(--border2);border-radius:9px;padding:8px 10px;color:var(--text);font-size:12px;font-family:\'DM Sans\',sans-serif;outline:none;">'+
      '<option value="">All Status</option><option value="active">Active</option><option value="trial">Trial</option><option value="expired">Expired</option><option value="suspended">Suspended</option>'+
    '</select>'+
  '</div>'+
  '<div class="tw"><div class="tw-head"><span class="tw-title">All Hospitals ('+hospitals.length+')</span></div>'+
  '<div class="tw-body"><table><thead><tr><th>Hospital</th><th>Plan</th><th>Status</th><th>Expires</th><th>Action</th></tr></thead><tbody>';
  hospitals.forEach(function(h){
    var st=h.subscriptionStatus||'trial';
    var bc=st==='active'?'green':st==='trial'?'orange':st==='suspended'?'red':'blue';
    html+='<tr>'+
      '<td><strong>'+esc(h.name||h.hospitalName||'-')+'</strong><br><span style="font-size:10px;color:var(--t3)">'+esc(h.adminEmail||'-')+'</span></td>'+
      '<td><span class="badge blue">'+esc(h.plan||'trial')+'</span></td>'+
      '<td><span class="badge '+bc+'">'+st+'</span></td>'+
      '<td style="font-size:11px">'+(h.subscriptionEnd?fdate(h.subscriptionEnd):h.trialEnd?fdate(h.trialEnd)+' (trial)':'-')+'</td>'+
      '<td style="white-space:nowrap">'+
        (st==='suspended'?
          '<button class="bs gr" onclick="updateHospital(\''+h.id+'\',\'active\')">✅ Activate</button>':
          '<button class="bs or" onclick="updateHospital(\''+h.id+'\',\'suspended\')">⛔ Suspend</button>')+
        ' <button class="bs re" onclick="deleteHospital(\''+h.id+'\',\''+esc(h.name||h.hospitalName||'')+'\')">🗑️</button>'+
      '</td></tr>';
  });
  html+='</tbody></table></div></div>';
  document.getElementById('tab-content').innerHTML = html;
}

function filterHospitals(q){
  var filtered = allHospitals.filter(function(h){
    return (h.name||h.hospitalName||'').toLowerCase().includes(q.toLowerCase())||
           (h.adminEmail||'').toLowerCase().includes(q.toLowerCase());
  });
  renderHospitals(filtered);
}
function filterByStatus(st){
  var filtered = st ? allHospitals.filter(function(h){return (h.subscriptionStatus||'trial')===st;}) : allHospitals;
  renderHospitals(filtered);
}

function updateHospital(id, status){
  if(!confirm('Change status to '+status+'?'))return;
  fetch(API+'/hospitals/'+id,{method:'PUT',headers:authHeader(),body:JSON.stringify({subscriptionStatus:status})})
  .then(function(r){return r.json();})
  .then(function(){toast('Updated ✅','s');loadHospitals();})
  .catch(function(e){toast(e.message,'e');});
}

function deleteHospital(id, name){
  if(!confirm('DELETE "'+name+'"? This cannot be undone!'))return;
  fetch(API+'/hospitals/'+id,{method:'DELETE',headers:authHeader()})
  .then(function(){toast('Deleted','s');loadHospitals();})
  .catch(function(e){toast(e.message,'e');});
}

function loadSubscriptions(){
  fetch(API+'/hospitals/all',{headers:authHeader()})
  .then(function(r){return r.json();})
  .then(function(res){
    var hospitals = (res.hospitals||[]).filter(function(h){return h.subscriptionStatus==='active';});
    var html = '<div class="tw"><div class="tw-head"><span class="tw-title">Active Subscriptions ('+hospitals.length+')</span></div>'+
      '<div class="tw-body"><table><thead><tr><th>Hospital</th><th>Plan</th><th>Billing</th><th>Renewal</th><th>Amount</th></tr></thead><tbody>';
    hospitals.forEach(function(h){
      var planPrice = {basic:999,pro:2499,enterprise:4999};
      html+='<tr>'+
        '<td><strong>'+esc(h.name||h.hospitalName||'-')+'</strong></td>'+
        '<td><span class="badge blue">'+esc(h.plan||'-')+'</span></td>'+
        '<td style="font-size:11px">Monthly</td>'+
        '<td style="font-size:11px">'+(h.subscriptionEnd?fdate(h.subscriptionEnd):'-')+'</td>'+
        '<td><strong style="color:var(--green)">₹'+(planPrice[h.plan]||0).toLocaleString('en-IN')+'</strong></td></tr>';
    });
    if(!hospitals.length) html+='<tr><td colspan="5" style="text-align:center;color:var(--t3);padding:24px">No active subscriptions</td></tr>';
    html+='</tbody></table></div></div>';
    document.getElementById('tab-content').innerHTML = html;
  }).catch(function(e){document.getElementById('tab-content').innerHTML='<div class="ld" style="color:var(--red)">❌ '+e.message+'</div>';});
}

function loadTrials(){
  fetch(API+'/hospitals/all',{headers:authHeader()})
  .then(function(r){return r.json();})
  .then(function(res){
    var hospitals = (res.hospitals||[]).filter(function(h){return h.subscriptionStatus==='trial';});
    var now = new Date();
    var html = '<div class="tw"><div class="tw-head"><span class="tw-title">Active Trials ('+hospitals.length+')</span></div>'+
      '<div class="tw-body"><table><thead><tr><th>Hospital</th><th>Trial Ends</th><th>Days Left</th><th>Action</th></tr></thead><tbody>';
    hospitals.forEach(function(h){
      var trialEnd = h.trialEnd ? new Date(h.trialEnd) : null;
      var daysLeft = trialEnd ? Math.max(0,Math.ceil((trialEnd-now)/(1000*60*60*24))) : '?';
      var color = daysLeft<=3 ? 'var(--red)' : daysLeft<=7 ? 'var(--amber)' : 'var(--green)';
      html+='<tr>'+
        '<td><strong>'+esc(h.name||h.hospitalName||'-')+'</strong><br><span style="font-size:10px;color:var(--t3)">'+esc(h.adminEmail||'-')+'</span></td>'+
        '<td style="font-size:11px">'+(trialEnd?fdate(h.trialEnd):'-')+'</td>'+
        '<td><strong style="color:'+color+'">'+daysLeft+' days</strong></td>'+
        '<td><button class="bs gr" onclick="extendTrial(\''+h.id+'\')">+7 Days</button></td></tr>';
    });
    if(!hospitals.length) html+='<tr><td colspan="4" style="text-align:center;color:var(--t3);padding:24px">No active trials</td></tr>';
    html+='</tbody></table></div></div>';
    document.getElementById('tab-content').innerHTML = html;
  }).catch(function(e){document.getElementById('tab-content').innerHTML='<div class="ld" style="color:var(--red)">❌ '+e.message+'</div>';});
}

function extendTrial(id){
  var newEnd = new Date(); newEnd.setDate(newEnd.getDate()+7);
  fetch(API+'/hospitals/'+id,{method:'PUT',headers:authHeader(),body:JSON.stringify({trialEnd:newEnd.toISOString()})})
  .then(function(r){return r.json();})
  .then(function(){toast('Trial extended by 7 days ✅','s');loadTrials();})
  .catch(function(e){toast(e.message,'e');});
}

function loadRevenue(){
  fetch(API+'/hospitals/all',{headers:authHeader()})
  .then(function(r){return r.json();})
  .then(function(res){
    var hospitals = res.hospitals||[];
    var planPrice = {basic:999,pro:2499,enterprise:4999};
    var activeH = hospitals.filter(function(h){return h.subscriptionStatus==='active';});
    var mrr = activeH.reduce(function(s,h){return s+(planPrice[h.plan]||0);},0);
    var arr = mrr * 12;
    var byPlan = {basic:0,pro:0,enterprise:0};
    activeH.forEach(function(h){if(byPlan[h.plan]!==undefined)byPlan[h.plan]++;});
    document.getElementById('tab-content').innerHTML =
      '<div class="sg">' +
        '<div class="sc sky"><div class="sc-val">₹'+mrr.toLocaleString('en-IN')+'</div><div class="sc-lbl">MRR</div></div>'+
        '<div class="sc gr"><div class="sc-val">₹'+arr.toLocaleString('en-IN')+'</div><div class="sc-lbl">ARR (Projected)</div></div>'+
        '<div class="sc or"><div class="sc-val">'+activeH.length+'</div><div class="sc-lbl">Paying Customers</div></div>'+
        '<div class="sc pu"><div class="sc-val">'+hospitals.length+'</div><div class="sc-lbl">Total Signups</div></div>'+
      '</div>'+
      '<div class="tw"><div class="tw-head"><span class="tw-title">Revenue by Plan</span></div><div class="tw-body"><table><thead><tr><th>Plan</th><th>Customers</th><th>Price/mo</th><th>MRR</th></tr></thead><tbody>'+
        ['basic','pro','enterprise'].map(function(p){
          return '<tr><td><span class="badge blue">'+p+'</span></td><td>'+byPlan[p]+'</td><td>₹'+planPrice[p].toLocaleString('en-IN')+'</td><td><strong style="color:var(--green)">₹'+(byPlan[p]*planPrice[p]).toLocaleString('en-IN')+'</strong></td></tr>';
        }).join('')+
      '</tbody></table></div></div>';
  }).catch(function(e){document.getElementById('tab-content').innerHTML='<div class="ld" style="color:var(--red)">❌ '+e.message+'</div>';});
}

function fdate(d){if(!d)return '-';try{return new Date(d).toLocaleDateString('en-IN');}catch(x){return d;}}
function esc(s){return String(s||'').replace(/[<>&"']/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c];});}

// Auto-login check
try{
  var t = localStorage.getItem('sa_token');
  if(t){SA_TOKEN=t;document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';showTab('dashboard');}
}catch(x){}

// Enter key login
document.getElementById('sa-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doAdminLogin();});
</script>
