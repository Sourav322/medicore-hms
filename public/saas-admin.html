<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MediCore — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#040e1a;--bg2:#081525;--bg3:#0d1e30;--card:#0b1a27;
  --border:#122236;--border2:#1a3050;
  --sky:#0ea5e9;--teal:#06b6d4;--green:#10b981;--red:#ef4444;
  --orange:#f59e0b;--purple:#8b5cf6;--pink:#ec4899;
  --text:#e2f0fb;--t2:#6b9ab5;--t3:#2e5068;
  --sb:220px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#1a3050;border-radius:2px;}
a{color:inherit;text-decoration:none;}

/* ── LOGIN ── */
#login-page{display:flex;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 40%,rgba(14,165,233,.08),transparent 50%),var(--bg);}
.login-box{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:40px;width:100%;max-width:400px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-ico{width:60px;height:60px;background:linear-gradient(135deg,var(--sky),var(--teal));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
.login-logo h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.login-logo p{font-size:12px;color:var(--t2);margin-top:3px;}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.fld{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:10px 13px;color:var(--text);font-size:13px;outline:none;transition:.2s;margin-bottom:10px;}
.fld:focus{border-color:var(--sky);}
.fld::placeholder{color:var(--t3);}
select.fld option{background:var(--bg3);}
.btn-p{width:100%;padding:11px;background:linear-gradient(135deg,var(--sky),var(--teal));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;transition:.2s;}
.btn-p:hover{filter:brightness(1.1);}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:8px 12px;color:#fca5a5;font-size:12px;margin-bottom:10px;display:none;}

/* ── APP LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden;}
.layout{display:flex;height:100vh;}
.sidebar{width:var(--sb);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100;}
.sb-head{padding:16px;border-bottom:1px solid var(--border);}
.sb-brand{display:flex;align-items:center;gap:10px;}
.sb-ico{width:36px;height:36px;background:linear-gradient(135deg,var(--sky),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.sb-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;}
.sb-tag{font-size:9px;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:rgba(239,68,68,.15);padding:1px 6px;border-radius:4px;margin-top:1px;display:inline-block;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px;}
.nav-sec{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:10px 8px 5px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:.15s;border:none;background:transparent;width:100%;text-align:left;margin-bottom:1px;}
.ni:hover{background:var(--bg3);color:var(--text);}
.ni.active{background:rgba(14,165,233,.12);color:var(--sky);}
.ni-i{width:16px;text-align:center;font-size:14px;flex-shrink:0;}
.sb-foot{padding:10px;border-top:1px solid var(--border);}
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.tb-r{display:flex;align-items:center;gap:10px;}
.tb-date{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--t2);}
.content{flex:1;overflow-y:auto;padding:18px;}

/* ── WIDGETS ── */
.sg{display:grid;gap:12px;margin-bottom:16px;}
.sg4{grid-template-columns:repeat(4,1fr);}
.sg3{grid-template-columns:repeat(3,1fr);}
.sg2{grid-template-columns:repeat(2,1fr);}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.sc-i{font-size:20px;margin-bottom:6px;}
.sc-v{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;}
.sc-l{font-size:11px;color:var(--t2);margin-top:2px;}
.sc-trend{font-size:10px;margin-top:5px;}
.sc-trend.up{color:var(--green);}
.sc-trend.dn{color:var(--red);}
.sc-glow{position:absolute;width:60px;height:60px;border-radius:50%;filter:blur(20px);top:-10px;right:-10px;opacity:.25;}

/* TABLE */
.tw{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.tw-h{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.tw-t{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;}
.sbx{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:5px 9px;}
.sbx input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:140px;}
.sbx input::placeholder{color:var(--t3);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);border-bottom:1px solid var(--border);}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid rgba(18,34,54,.8);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(14,165,233,.02);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.bg-gr{background:rgba(16,185,129,.15);color:#34d399;}
.bg-or{background:rgba(245,158,11,.15);color:#fbbf24;}
.bg-re{background:rgba(239,68,68,.15);color:#f87171;}
.bg-bl{background:rgba(14,165,233,.15);color:#38bdf8;}
.bg-pu{background:rgba(139,92,246,.15);color:#a78bfa;}
.bg-gy{background:rgba(100,116,139,.15);color:#94a3b8;}
.bs{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;}
.bs.pr{background:rgba(14,165,233,.15);color:var(--sky);}
.bs.gr{background:rgba(16,185,129,.12);color:#34d399;}
.bs.re{background:rgba(239,68,68,.1);color:#f87171;}
.bs.or{background:rgba(245,158,11,.12);color:#fbbf24;}
.ld{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--t2);}
.sp{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--sky);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.es{text-align:center;padding:40px;color:var(--t2);}
.es-i{font-size:36px;margin-bottom:10px;}
.ph2{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.pt2{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.btn-n{display:flex;align-items:center;gap:5px;padding:8px 14px;background:linear-gradient(135deg,var(--sky),var(--teal));border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;}
.pg{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.page-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ptab{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;}
.ptab.active{background:var(--sky);color:#fff;border-color:var(--sky);}

/* MODAL */
.modal{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;padding:12px;}
.modal.open{display:flex;}
.mb{position:absolute;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;position:relative;z-index:1;}
.mh{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.mt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.mc{background:none;border:none;color:var(--t2);font-size:18px;}
.mbody{padding:16px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{margin-bottom:10px;}
.ba{padding:10px 18px;background:linear-gradient(135deg,var(--sky),var(--teal));border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:700;width:100%;margin-top:4px;}

/* REVENUE CHART */
.rev-chart{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.bar-wrap{display:flex;align-items:flex-end;gap:8px;height:120px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar-b{width:100%;background:linear-gradient(to top,var(--sky),var(--teal));border-radius:3px 3px 0 0;min-height:4px;transition:.5s;}
.bar-m{font-size:9px;color:var(--t3);}
.bar-v{font-size:9px;color:var(--t2);}

/* PLAN RING */
.plan-donut{width:120px;height:120px;border-radius:50%;margin:12px auto;}

/* TOAST */
#tst{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:7px;}
.tsi{padding:9px 14px;border-radius:9px;font-size:12px;color:#fff;font-weight:600;animation:si .3s ease;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
@keyframes si{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.tsi.fade{opacity:0;transition:.3s;}
</style>
</head>
<body>
<div id="tst"></div>

<!-- ═══ LOGIN ═══ -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-ico">⚡</div>
      <h1>MediCore Super Admin</h1>
      <p>SaaS Management Console</p>
    </div>
    <div id="lg-err" class="err"></div>
    <label class="lbl">Email</label>
    <input id="lg-em" class="fld" type="email" placeholder="superadmin@medicore.app" autocomplete="email">
    <label class="lbl">Password</label>
    <input id="lg-pw" class="fld" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-p" id="btn-lg">⚡ Login to Console</button>
    <p style="font-size:11px;color:var(--t3);text-align:center;margin-top:12px">Hospital Admin? <a href="index.html" style="color:var(--sky)">Go to HMS Login →</a></p>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
<div class="layout">
  <nav class="sidebar">
    <div class="sb-head">
      <div class="sb-brand">
        <div class="sb-ico">⚡</div>
        <div><div class="sb-name">MediCore</div><div class="sb-tag">Super Admin</div></div>
      </div>
    </div>
    <div class="sb-nav">
      <div class="nav-sec">Overview</div>
      <button class="ni active" onclick="nav('dash')"><span class="ni-i">📊</span>Dashboard</button>
      <button class="ni" onclick="nav('revenue')"><span class="ni-i">💰</span>Revenue</button>
      <div class="nav-sec">Hospitals</div>
      <button class="ni" onclick="nav('hospitals')"><span class="ni-i">🏥</span>All Hospitals</button>
      <button class="ni" onclick="nav('trials')"><span class="ni-i">⏳</span>Free Trials <span id="trial-badge" style="background:#f59e0b;color:#000;border-radius:10px;padding:1px 6px;font-size:9px;margin-left:4px">0</span></button>
      <button class="ni" onclick="nav('expired')"><span class="ni-i">🔴</span>Expired / Inactive</button>
      <div class="nav-sec">Subscriptions</div>
      <button class="ni" onclick="nav('plans')"><span class="ni-i">📦</span>Plans Manager</button>
      <button class="ni" onclick="nav('payments')"><span class="ni-i">💳</span>Payments</button>
      <div class="nav-sec">System</div>
      <button class="ni" onclick="nav('settings')"><span class="ni-i">⚙️</span>Settings</button>
    </div>
    <div class="sb-foot">
      <button class="ni" onclick="doLogout()" style="color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:8px">🚪 Logout</button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <span class="tb-title" id="tb-t">Dashboard</span>
      <div class="tb-r">
        <span class="tb-date" id="tb-date"></span>
        <span id="tb-user" style="font-size:12px;color:var(--t2)"></span>
      </div>
    </div>
    <div class="content" id="content">
      <div class="ld"><div class="sp"></div> Loading...</div>
    </div>
  </div>
</div>
</div>

<!-- ADD PLAN MODAL -->
<div class="modal" id="m-plan">
  <div class="mb" onclick="closeM('m-plan')"></div>
  <div class="mbox">
    <div class="mh"><span class="mt">📦 Add / Edit Plan</span><button class="mc" onclick="closeM('m-plan')">✕</button></div>
    <div class="mbody">
      <div class="fr">
        <div class="fg"><label class="lbl">Plan Name *</label><input id="pl-nm" class="fld" placeholder="Professional"></div>
        <div class="fg"><label class="lbl">Plan ID *</label><input id="pl-id" class="fld" placeholder="pro"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="lbl">Monthly Price (₹) *</label><input id="pl-mp" class="fld" type="number" placeholder="2499"></div>
        <div class="fg"><label class="lbl">Yearly Price (₹) *</label><input id="pl-yp" class="fld" type="number" placeholder="1749"></div>
      </div>
      <div class="fg"><label class="lbl">Max Patients/month</label><input id="pl-pt" class="fld" type="number" placeholder="0 = unlimited"></div>
      <div class="fg"><label class="lbl">Max Staff Accounts</label><input id="pl-st" class="fld" type="number" placeholder="0 = unlimited"></div>
      <div class="fg"><label class="lbl">Trial Days</label><input id="pl-tr" class="fld" type="number" value="14" placeholder="14"></div>
      <div class="fg"><label class="lbl">Features (comma-separated)</label>
        <textarea id="pl-ft" class="fld" rows="3" placeholder="OPD Billing,IPD Admission,Lab,Reports,Discharge,Packages"></textarea>
      </div>
      <div class="fg">
        <label class="lbl">Razorpay Plan ID (Monthly)</label>
        <input id="pl-rzm" class="fld" placeholder="plan_XXXXXXXXXX">
      </div>
      <div class="fg">
        <label class="lbl">Razorpay Plan ID (Yearly)</label>
        <input id="pl-rzy" class="fld" placeholder="plan_YYYYYYYYYY">
      </div>
      <button class="ba" id="btn-plan" onclick="savePlan()">💾 Save Plan</button>
    </div>
  </div>
</div>

<!-- HOSPITAL DETAIL MODAL -->
<div class="modal" id="m-hosp">
  <div class="mb" onclick="closeM('m-hosp')"></div>
  <div class="mbox" style="max-width:600px">
    <div class="mh"><span class="mt" id="mh-title">Hospital Details</span><button class="mc" onclick="closeM('m-hosp')">✕</button></div>
    <div class="mbody" id="mh-body"><div class="ld"><div class="sp"></div></div></div>
  </div>
</div>

<script>
var API = 'https://web-production-d347.up.railway.app/api';
var SUPER_EMAIL = 'superadmin@medicore.app'; // Change to your super admin email
var SA = { token: null, user: null };

// ── CORE ──
function ge(id){return document.getElementById(id);}
function cur(v){return '₹'+(parseFloat(v)||0).toLocaleString('en-IN',{maximumFractionDigits:0});}
function fdate(d){if(!d)return '-';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,t){
  var c={s:'#10b981',e:'#ef4444',i:'#0284c7',w:'#f59e0b'};
  var d=document.createElement('div');d.className='tsi';d.style.background=c[t||'s']||c.s;d.textContent=msg;
  ge('tst').appendChild(d);setTimeout(function(){d.classList.add('fade');},2800);setTimeout(function(){d&&d.parentNode&&d.parentNode.removeChild(d);},3200);
}
function openM(id){var m=ge(id);if(m)m.classList.add('open');}
function closeM(id){var m=ge(id);if(m)m.classList.remove('open');}
function api(method,path,body){
  var h={'Content-Type':'application/json'};
  if(SA.token)h['Authorization']='Bearer '+SA.token;
  return fetch(API+path,{method:method,headers:h,body:body?JSON.stringify(body):undefined})
    .then(function(r){return r.ok?r.json():r.json().then(function(e){throw new Error(e.error||'Error');});});
}
// Local plan storage (Firestore not required for plans)
function getPlans(){try{return JSON.parse(localStorage.getItem('mc_saas_plans')||'[]');}catch(x){return [];}}
function savePlansLocal(p){try{localStorage.setItem('mc_saas_plans',JSON.stringify(p));}catch(x){}}

// ── AUTH ──
function doLogin(){
  var em=(ge('lg-em').value||'').trim(), pw=ge('lg-pw').value||'';
  var err=ge('lg-err');err.style.display='none';
  if(!em||!pw){err.textContent='Email and password required';err.style.display='block';return;}
  var btn=ge('btn-lg');btn.textContent='Logging in...';btn.disabled=true;
  api('POST','/auth/login',{email:em,password:pw})
    .then(function(res){
      // Check super admin role
      if(res.user.role!=='super_admin'&&res.user.role!=='hospital_admin'){
        err.textContent='Super Admin access required';err.style.display='block';return;
      }
      SA.token=res.token;SA.user=res.user;
      try{localStorage.setItem('mc_sa_sess',JSON.stringify({token:res.token,user:res.user}));}catch(x){}
      launchApp();
    })
    .catch(function(e){err.textContent=e.message||'Login failed';err.style.display='block';})
    .finally(function(){btn.textContent='⚡ Login to Console';btn.disabled=false;});
}
function doLogout(){
  try{localStorage.removeItem('mc_sa_sess');}catch(x){}
  SA.token=null;SA.user=null;
  ge('app').style.display='none';ge('login-page').style.display='flex';
}
function launchApp(){
  ge('login-page').style.display='none';ge('app').style.display='block';
  ge('tb-date').textContent=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  if(SA.user)ge('tb-user').textContent='👤 '+SA.user.name;
  nav('dash');
}

var TITLES={dash:'Dashboard',revenue:'Revenue Analytics',hospitals:'All Hospitals',trials:'Free Trials',expired:'Expired / Inactive',plans:'Plans Manager',payments:'Payments',settings:'Settings'};
function nav(page){
  ge('content').innerHTML='<div class="ld"><div class="sp"></div></div>';
  ge('tb-t').textContent=TITLES[page]||page;
  document.querySelectorAll('.ni').forEach(function(el){el.classList.remove('active');if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+page+"'"))el.classList.add('active');});
  if(PAGES[page])PAGES[page]();
  else ge('content').innerHTML='<div class="es"><div class="es-i">🚧</div><p>Coming soon</p></div>';
}

// ── FETCH ALL HOSPITALS (via Firebase) ──
function fetchHospitals(){
  return api('GET','/hospitals/all').catch(function(){
    // Fallback: try direct
    return api('GET','/hospitals?limit=500');
  });
}

// ── PAGES ──
var PAGES={};

// DASHBOARD
PAGES.dash=function(){
  var c=ge('content');
  c.innerHTML=
    '<div class="sg sg4">'+
      '<div class="sc"><div class="sc-glow" style="background:var(--sky)"></div><div class="sc-i">🏥</div><div class="sc-v" id="d-total">-</div><div class="sc-l">Total Hospitals</div></div>'+
      '<div class="sc"><div class="sc-glow" style="background:var(--green)"></div><div class="sc-i">✅</div><div class="sc-v" id="d-active">-</div><div class="sc-l">Active Subscriptions</div></div>'+
      '<div class="sc"><div class="sc-glow" style="background:var(--orange)"></div><div class="sc-i">⏳</div><div class="sc-v" id="d-trial">-</div><div class="sc-l">Free Trials</div></div>'+
      '<div class="sc"><div class="sc-glow" style="background:var(--red)"></div><div class="sc-i">🔴</div><div class="sc-v" id="d-exp">-</div><div class="sc-l">Expired</div></div>'+
    '</div>'+
    '<div class="sg sg4">'+
      '<div class="sc"><div class="sc-glow" style="background:var(--purple)"></div><div class="sc-i">💰</div><div class="sc-v" id="d-rev">-</div><div class="sc-l">Total Revenue (MRR)</div></div>'+
      '<div class="sc"><div class="sc-glow" style="background:var(--teal)"></div><div class="sc-i">📦</div><div class="sc-v" id="d-plans">-</div><div class="sc-l">Plans Configured</div></div>'+
      '<div class="sc"><div class="sc-glow" style="background:var(--green)"></div><div class="sc-i">📅</div><div class="sc-v" id="d-new">-</div><div class="sc-l">New This Month</div></div>'+
      '<div class="sc"><div class="sc-glow" style="background:var(--pink)"></div><div class="sc-i">📈</div><div class="sc-v" id="d-growth">-</div><div class="sc-l">Growth Rate</div></div>'+
    '</div>'+
    '<div class="sg sg2">'+
      '<div class="rev-chart"><div style="font-size:13px;font-weight:700;margin-bottom:10px">📈 Monthly Revenue</div><div class="bar-wrap" id="rev-bars"></div></div>'+
      '<div class="tw"><div class="tw-h"><span class="tw-t">Plan Distribution</span></div><div id="plan-dist" style="padding:14px"></div></div>'+
    '</div>'+
    '<div class="tw"><div class="tw-h"><span class="tw-t">🏥 Recently Registered Hospitals</span></div><div id="recent-hosps"><div class="ld"><div class="sp"></div></div></div></div>';

  api('GET','/hospitals/all?limit=200')
    .then(function(res){
      var hosps=res.hospitals||res.data||[];
      var now=new Date();
      var active=hosps.filter(function(h){return h.subscriptionStatus==='active';}).length;
      var trial=hosps.filter(function(h){return h.subscriptionStatus==='trial'||(!h.subscriptionStatus&&h.status==='active');}).length;
      var exp=hosps.filter(function(h){return h.subscriptionStatus==='expired'||h.status==='inactive';}).length;
      var thisMonth=hosps.filter(function(h){var d=new Date(h.createdAt||'');return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;

      if(ge('d-total'))ge('d-total').textContent=hosps.length;
      if(ge('d-active'))ge('d-active').textContent=active;
      if(ge('d-trial'))ge('d-trial').textContent=trial;
      if(ge('d-exp'))ge('d-exp').textContent=exp;
      if(ge('d-new'))ge('d-new').textContent=thisMonth;
      if(ge('d-growth'))ge('d-growth').textContent=(hosps.length?Math.round(thisMonth/hosps.length*100):0)+'%';

      // Plans
      var plans=getPlans();
      if(ge('d-plans'))ge('d-plans').textContent=plans.length;

      // MRR calc
      var mrr=hosps.filter(function(h){return h.subscriptionStatus==='active';}).reduce(function(s,h){
        var p=plans.find(function(pl){return pl.id===h.plan;});
        return s+(p?p.monthlyPrice||0:0);
      },0);
      if(ge('d-rev'))ge('d-rev').textContent=cur(mrr);

      // Revenue bars (last 6 months - simulated from created dates)
      var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var nowM=now.getMonth(),nowY=now.getFullYear();
      var bars=[];
      for(var i=5;i>=0;i--){
        var m=(nowM-i+12)%12;var y=nowM-i<0?nowY-1:nowY;
        var cnt=hosps.filter(function(h){var d=new Date(h.createdAt||'');return d.getMonth()===m&&d.getFullYear()===y;}).length;
        bars.push({label:months[m],count:cnt,rev:cnt*2000});
      }
      var maxRev=Math.max.apply(null,bars.map(function(b){return b.rev;}));
      var barsHtml='';
      bars.forEach(function(b){
        var pct=maxRev?Math.round(b.rev/maxRev*100):5;
        barsHtml+='<div class="bar-col"><div class="bar-v">'+cur(b.rev)+'</div><div class="bar-b" style="height:'+Math.max(pct,5)+'%"></div><div class="bar-m">'+b.label+'</div></div>';
      });
      if(ge('rev-bars'))ge('rev-bars').innerHTML=barsHtml||'<div class="ld">No data yet</div>';

      // Plan dist
      var planCounts={};
      hosps.forEach(function(h){var p=h.plan||'trial';planCounts[p]=(planCounts[p]||0)+1;});
      var colors={trial:'#f59e0b',basic:'#0ea5e9',pro:'#10b981',professional:'#10b981',enterprise:'#8b5cf6',custom:'#ec4899'};
      var pdHtml='';
      Object.keys(planCounts).forEach(function(k){
        var pct=Math.round(planCounts[k]/hosps.length*100)||0;
        pdHtml+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="text-transform:capitalize">'+esc(k)+'</span><span>'+planCounts[k]+' ('+pct+'%)</span></div>'+
          '<div style="background:var(--bg3);border-radius:4px;height:8px"><div style="width:'+pct+'%;height:100%;border-radius:4px;background:'+(colors[k]||'#0ea5e9')+'"></div></div></div>';
      });
      if(ge('plan-dist'))ge('plan-dist').innerHTML=pdHtml||'<div class="es" style="padding:20px">No hospitals yet</div>';

      // Recent
      var recent=hosps.slice(0,8);
      var el=ge('recent-hosps');if(!el)return;
      if(!recent.length){el.innerHTML='<div class="es"><div class="es-i">🏥</div><p>No hospitals yet</p></div>';return;}
      var html='<table><thead><tr><th>Hospital</th><th>Plan</th><th>Status</th><th>Registered</th><th>Action</th></tr></thead><tbody>';
      recent.forEach(function(h){
        var st=h.subscriptionStatus||'trial';
        var bc=st==='active'?'bg-gr':st==='trial'?'bg-or':st==='expired'?'bg-re':'bg-gy';
        html+='<tr><td><strong>'+esc(h.name||'-')+'</strong><br><span style="font-size:10px;color:var(--t3)">'+esc(h.address||'')+'</span></td>'+
          '<td><span class="badge bg-bl">'+esc(h.plan||'trial')+'</span></td>'+
          '<td><span class="badge '+bc+'">'+esc(st)+'</span></td>'+
          '<td>'+fdate(h.createdAt)+'</td>'+
          '<td><button class="bs pr" onclick="showHospital(\''+h.id+'\')">View</button></td></tr>';
      });
      el.innerHTML=html+'</tbody></table>';

      // Update trial badge
      if(ge('trial-badge'))ge('trial-badge').textContent=trial;
    })
    .catch(function(err){
      ge('content').innerHTML='<div class="es"><div class="es-i">❌</div><p>'+esc(err.message)+'</p><p style="font-size:11px;color:var(--t3);margin-top:8px">Make sure /hospitals/all endpoint exists in backend</p></div>';
    });
};

function loadHospTab(btn,status,q){
  if(btn){document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');}
  api('GET','/hospitals/all?limit=500')
    .then(function(res){
      var hosps=res.hospitals||res.data||[];
      if(status)hosps=hosps.filter(function(h){return (h.subscriptionStatus||'trial')===status;});
      if(q)hosps=hosps.filter(function(h){return (h.name||'').toLowerCase().includes(q.toLowerCase());});
      var el=ge('hs-list');if(!el)return;
      if(!hosps.length){el.innerHTML='<div class="es"><div class="es-i">🏥</div><p>No hospitals found</p></div>';return;}
      var html='<table><thead><tr><th>Hospital</th><th>Admin Email</th><th>Plan</th><th>Trial End</th><th>Status</th><th>Registered</th><th>Action</th></tr></thead><tbody>';
      hosps.forEach(function(h){
        var st=h.subscriptionStatus||'trial';
        var bc=st==='active'?'bg-gr':st==='trial'?'bg-or':st==='expired'?'bg-re':'bg-gy';
        var trialEnd=h.trialEnd?fdate(h.trialEnd):'-';
        var daysLeft='';
        if(h.trialEnd&&st==='trial'){var d=Math.ceil((new Date(h.trialEnd)-new Date())/(1000*60*60*24));daysLeft=' ('+Math.max(0,d)+' days left)';}
        html+='<tr>'+
          '<td><strong>'+esc(h.name||'-')+'</strong><br><span style="font-size:10px;color:var(--t3)">'+esc(h.phone||'')+'</span></td>'+
          '<td style="font-size:11px">'+esc(h.adminEmail||h.email||'-')+'</td>'+
          '<td><span class="badge bg-bl">'+esc(h.plan||'trial')+'</span></td>'+
          '<td style="font-size:11px">'+trialEnd+esc(daysLeft)+'</td>'+
          '<td><span class="badge '+bc+'">'+esc(st)+'</span></td>'+
          '<td>'+fdate(h.createdAt)+'</td>'+
          '<td>'+
            '<button class="bs pr" onclick="showHospital(\''+h.id+'\')">Details</button> '+
            '<button class="bs '+(st==='active'?'or':'gr')+'" onclick="changeHospStatus(\''+h.id+'\',\''+st+'\')">'+(st==='active'?'Suspend':'Activate')+'</button>'+
          '</td></tr>';
      });
      el.innerHTML=html+'</tbody></table>';
    }).catch(function(){var el=ge('hs-list');if(el)el.innerHTML='<div class="es"><div class="es-i">❌</div><p>Failed to load</p></div>';});
}

// TRIALS
PAGES.trials=function(){
  ge('content').innerHTML='<div class="ph2"><span class="pt2">⏳ Free Trials</span></div>'+
    '<div id="trial-list"><div class="ld"><div class="sp"></div></div></div>';
  api('GET','/hospitals/all?limit=500')
    .then(function(res){
      var hosps=(res.hospitals||res.data||[]).filter(function(h){return (h.subscriptionStatus||'trial')==='trial'||(h.status==='active'&&!h.subscriptionStatus);});
      var el=ge('trial-list');if(!el)return;
      var now=new Date();
      // Sort by trial end (soonest first)
      hosps.sort(function(a,b){return new Date(a.trialEnd||'9999')-new Date(b.trialEnd||'9999');});
      if(!hosps.length){el.innerHTML='<div class="es"><div class="es-i">⏳</div><p>No active trials</p></div>';return;}
      var html='<div class="sg sg3" style="margin-bottom:14px">'+

        '<div class="sc"><div class="sc-i">⚠️</div><div class="sc-v">'+hosps.filter(function(h){return h.trialEnd&&Math.ceil((new Date(h.trialEnd)-now)/(1000*60*60*24))<=3;}).length+'</div><div class="sc-l">Expiring in 3 days</div></div>'+
        '<div class="sc"><div class="sc-i">💰</div><div class="sc-v">'+hosps.filter(function(h){return h.trialEnd&&Math.ceil((new Date(h.trialEnd)-now)/(1000*60*60*24))<0;}).length+'</div><div class="sc-l">Already Expired</div></div>'+
      '</div>'+
      '<div class="tw"><div class="tw-h"><span class="tw-t">Trial Hospitals</span></div>'+
      '<table><thead><tr><th>Hospital</th><th>Plan Selected</th><th>Trial End</th><th>Days Left</th><th>Action</th></tr></thead><tbody>';
      hosps.forEach(function(h){
        var days=h.trialEnd?Math.ceil((new Date(h.trialEnd)-now)/(1000*60*60*24)):14;
        var urgency=days<=0?'bg-re':days<=3?'bg-or':'bg-gr';
        html+='<tr>'+
          '<td><strong>'+esc(h.name||'-')+'</strong><br><span style="font-size:10px;color:var(--t3)">'+esc(h.phone||h.adminEmail||'')+'</span></td>'+

          '<td>'+fdate(h.trialEnd)+'</td>'+
          '<td><span class="badge '+urgency+'">'+(days<=0?'Expired':days+' days')+'</span></td>'+
          '<td>'+
            '<button class="bs gr" onclick="extendTrial(\''+h.id+'\')">+7 Days</button> '+
            '<button class="bs pr" onclick="showHospital(\''+h.id+'\')">Details</button>'+
          '</td></tr>';
      });
      el.innerHTML=html+'</tbody></table></div>';
      if(ge('trial-badge'))ge('trial-badge').textContent=hosps.length;
    }).catch(function(){ge('trial-list').innerHTML='<div class="es"><div class="es-i">❌</div><p>Failed</p></div>';});
};

      '<div class="sg sg4">'+
        '<div class="sc"><div class="sc-i">💰</div><div class="sc-v">'+cur(mrr)+'</div><div class="sc-l">MRR (Monthly Recurring)</div></div>'+
        '<div class="sc"><div class="sc-i">📈</div><div class="sc-v">'+cur(mrr*12)+'</div><div class="sc-l">ARR (Annual Recurring)</div></div>'+
        '<div class="sc"><div class="sc-i">✅</div><div class="sc-v">'+active.length+'</div><div class="sc-l">Paying Customers</div></div>'+
        '<div class="sc"><div class="sc-i">⏳</div><div class="sc-v">'+trial.length+'</div><div class="sc-l">Trial Users</div></div>'+
      '</div>'+
      '<div class="tw"><div class="tw-h"><span class="tw-t">Revenue by Plan</span></div>'+
      '<table><thead><tr><th>Plan</th><th>Hospitals</th><th>Monthly Price</th><th>MRR Contribution</th></tr></thead><tbody>'+
      plans.map(function(p){
        var cnt=active.filter(function(h){return h.plan===p.id;}).length;
        var rev=cnt*p.monthlyPrice;
        return '<tr><td><span class="badge bg-bl">'+esc(p.name)+'</span></td><td>'+cnt+'</td><td>'+cur(p.monthlyPrice)+'</td><td><strong>'+cur(rev)+'</strong></td></tr>';
      }).join('')+
      '</tbody></table></div>';
  }).catch(function(){ge('rev-content').innerHTML='<div class="es"><div class="es-i">❌</div><p>Failed</p></div>';});
};

// ── ACTIONS ──
function showHospital(id){
  openM('m-hosp');
  var mb=ge('mh-body');mb.innerHTML='<div class="ld"><div class="sp"></div></div>';
  api('GET','/hospitals/'+id).then(function(res){
    var h=res.hospital||res;
    ge('mh-title').textContent=esc(h.name||'Hospital');
    var plans=getPlans();
    var plan=plans.find(function(p){return p.id===h.plan;})||{};
    var st=h.subscriptionStatus||'trial';
    var trialDays=h.trialEnd?Math.ceil((new Date(h.trialEnd)-new Date())/(1000*60*60*24)):0;
    mb.innerHTML=
      '<div class="pg"><div class="fr">'+
        '<div><div style="font-size:10px;color:var(--t3)">Hospital Name</div><div style="font-weight:700">'+esc(h.name||'-')+'</div></div>'+
        '<div><div style="font-size:10px;color:var(--t3)">Status</div><div><span class="badge '+(st==='active'?'bg-gr':st==='trial'?'bg-or':'bg-re')+'">'+esc(st)+'</span></div></div>'+
      '</div></div>'+
      '<div class="fr">'+
        '<div class="pg"><div style="font-size:10px;color:var(--t3)">Phone</div><div>'+esc(h.phone||'-')+'</div></div>'+
        '<div class="pg"><div style="font-size:10px;color:var(--t3)">Address</div><div>'+esc(h.address||'-')+'</div></div>'+
      '</div>'+
      '<div class="fr">'+
        '<div class="pg"><div style="font-size:10px;color:var(--t3)">Plan</div><div><span class="badge bg-bl">'+esc(h.plan||'trial')+'</span></div></div>'+
        '<div class="pg"><div style="font-size:10px;color:var(--t3)">Trial End</div><div>'+fdate(h.trialEnd)+(trialDays>0?' ('+trialDays+' days left)':trialDays<0?' <span style="color:var(--red)">Expired</span>':'')+'</div></div>'+
      '</div>'+
      '<div class="pg"><div style="font-size:10px;color:var(--t3)">Registered</div><div>'+fdate(h.createdAt)+'</div></div>'+
      '<div class="fr" style="margin-top:12px">'+
        '<div class="fg"><label class="lbl">Change Plan</label>'+
          '<select id="chg-plan" class="fld">'+
            plans.map(function(p){return '<option value="'+p.id+'"'+(h.plan===p.id?' selected':'')+'>'+esc(p.name)+'</option>';}).join('')+
          '</select>'+
        '</div>'+
        '<div class="fg"><label class="lbl">Change Status</label>'+
          '<select id="chg-status" class="fld">'+
            '<option value="trial"'+(st==='trial'?' selected':'')+'>Trial</option>'+
            '<option value="active"'+(st==='active'?' selected':'')+'>Active</option>'+
            '<option value="expired"'+(st==='expired'?' selected':'')+'>Expired</option>'+
            '<option value="suspended"'+(st==='suspended'?' selected':'')+'>Suspended</option>'+
          '</select>'+
        '</div>'+
      '</div>'+
      '<div class="fg"><label class="lbl">Extend Trial End Date</label><input id="chg-trial" class="fld" type="date" value="'+(h.trialEnd?h.trialEnd.split('T')[0]:'')+'"></div>'+
      '<button class="ba" onclick="updateHospital(\''+id+'\')">💾 Update Hospital</button>'+
      '<div style="margin-top:12px;display:flex;gap:8px">'+
        '<button class="bs re" onclick="deleteHosp(\''+id+'\')">🗑️ Delete Hospital</button>'+
        '<button class="bs or" onclick="extendTrial(\''+id+'\')">+7 Days Trial</button>'+
      '</div>';
  }).catch(function(){ge('mh-body').innerHTML='<div class="es"><div class="es-i">❌</div><p>Failed to load</p></div>';});
}

function updateHospital(id){
  var plan=ge('chg-plan')&&ge('chg-plan').value;
  var status=ge('chg-status')&&ge('chg-status').value;
  var trialEnd=ge('chg-trial')&&ge('chg-trial').value;
  api('PUT','/hospitals/'+id,{plan:plan,subscriptionStatus:status,trialEnd:trialEnd?new Date(trialEnd).toISOString():undefined})
    .then(function(){closeM('m-hosp');toast('Hospital updated! ✅','s');nav('hospitals');})
    .catch(function(e){toast(e.message,'e');});
}

function changeHospStatus(id,curStatus){
  var newSt=curStatus==='active'?'suspended':'active';
  if(!confirm((newSt==='suspended'?'Suspend':'Activate')+' this hospital?'))return;
  api('PUT','/hospitals/'+id,{subscriptionStatus:newSt})
    .then(function(){toast('Status changed to '+newSt,'s');loadHospTab(null,'');})
    .catch(function(e){toast(e.message,'e');});
}

function extendTrial(id){
  var newEnd=new Date();newEnd.setDate(newEnd.getDate()+7);
  api('PUT','/hospitals/'+id,{trialEnd:newEnd.toISOString(),subscriptionStatus:'trial'})
    .then(function(){toast('Trial extended by 7 days! ✅','s');nav('trials');})
    .catch(function(e){toast(e.message,'e');});
}

function reactivate(id){
  var trialEnd=new Date();trialEnd.setDate(trialEnd.getDate()+14);
  api('PUT','/hospitals/'+id,{subscriptionStatus:'trial',status:'active',trialEnd:trialEnd.toISOString()})
    .then(function(){toast('Reactivated! ✅','s');nav('expired');})
    .catch(function(e){toast(e.message,'e');});
}

function deleteHosp(id){
  if(!confirm('DELETE this hospital permanently? This cannot be undone!'))return;
  if(!confirm('Are you SURE? All data will be lost!'))return;
  api('DELETE','/hospitals/'+id)
    .then(function(){closeM('m-hosp');toast('Hospital deleted','s');nav('hospitals');})
    .catch(function(e){toast(e.message,'e');});
}

// PLANS
function newPlan(){
  ['pl-nm','pl-id','pl-mp','pl-yp','pl-pt','pl-st','pl-ft','pl-rzm','pl-rzy'].forEach(function(id){var el=ge(id);if(el)el.value='';});
  if(ge('pl-tr'))ge('pl-tr').value='14';
  ge('btn-plan').dataset.editIndex='';
  openM('m-plan');
}
function editPlan(i){
  var plans=getPlans();var p=plans[i];if(!p)return;
  if(ge('pl-nm'))ge('pl-nm').value=p.name||'';
  if(ge('pl-id'))ge('pl-id').value=p.id||'';
  if(ge('pl-mp'))ge('pl-mp').value=p.monthlyPrice||'';
  if(ge('pl-yp'))ge('pl-yp').value=p.yearlyPrice||'';
  if(ge('pl-pt'))ge('pl-pt').value=p.maxPatients||'';
  if(ge('pl-st'))ge('pl-st').value=p.maxStaff||'';
  if(ge('pl-tr'))ge('pl-tr').value=p.trialDays||14;
  if(ge('pl-ft'))ge('pl-ft').value=(p.features||[]).join(',');
  if(ge('pl-rzm'))ge('pl-rzm').value=p.razorpayPlanMonthly||'';
  if(ge('pl-rzy'))ge('pl-rzy').value=p.razorpayPlanYearly||'';
  ge('btn-plan').dataset.editIndex=i;
  openM('m-plan');
}
function savePlan(){
  var nm=(ge('pl-nm').value||'').trim(),id=(ge('pl-id').value||'').trim().toLowerCase();
  var mp=parseFloat(ge('pl-mp').value)||0,yp=parseFloat(ge('pl-yp').value)||0;
  var pt=parseInt(ge('pl-pt').value)||0,st=parseInt(ge('pl-st').value)||0;
  var tr=parseInt(ge('pl-tr').value)||14;
  var ft=(ge('pl-ft').value||'').split(',').map(function(f){return f.trim();}).filter(Boolean);
  var rzm=(ge('pl-rzm').value||'').trim(),rzy=(ge('pl-rzy').value||'').trim();
  if(!nm||!id){toast('Name and ID required','e');return;}
  var plans=getPlans();
  var editIdx=ge('btn-plan').dataset.editIndex;
  var plan={name:nm,id:id,monthlyPrice:mp,yearlyPrice:yp,maxPatients:pt,maxStaff:st,trialDays:tr,features:ft,razorpayPlanMonthly:rzm,razorpayPlanYearly:rzy};
  if(editIdx!==''){plans[editIdx]=plan;}else{plans.push(plan);}
  savePlansLocal(plans);
  closeM('m-plan');toast('Plan saved! ✅','s');PAGES.plans();
}
function deletePlan(i){
  if(!confirm('Delete this plan?'))return;
  var plans=getPlans();plans.splice(i,1);savePlansLocal(plans);PAGES.plans();toast('Plan deleted','s');
}

function saveRazorpay(){
  try{localStorage.setItem('rz_key_id',ge('rz-kid').value||'');localStorage.setItem('rz_key_secret',ge('rz-sec').value||'');}catch(x){}
  toast('Saved! Add these to Railway env vars too.','s');
}

window.addEventListener('DOMContentLoaded',function(){
  ge('btn-lg').addEventListener('click',doLogin);
  ge('lg-pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  // Restore session
  try{
    var sess=JSON.parse(localStorage.getItem('mc_sa_sess')||'null');
    if(sess&&sess.token){SA.token=sess.token;SA.user=sess.user;launchApp();}
  }catch(x){}
});
