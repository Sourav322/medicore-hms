<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MediCore HMS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
button,input,select,textarea{font-family:inherit;font-size:14px}

/* Icons - no CDN */
.i{display:inline-flex;align-items:center;justify-content:center;width:1.2em;height:1.2em;vertical-align:middle;flex-shrink:0}

/* Layout */
#app{display:none;height:100vh;flex-direction:row;overflow:hidden}
#sidebar{width:240px;min-width:240px;background:#0f172a;display:flex;flex-direction:column;height:100vh;overflow-y:auto;transition:transform .25s}
#main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
#content{flex:1;overflow-y:auto;padding:16px;background:#f1f5f9}

/* Sidebar */
.sb-top{padding:16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-icon{width:38px;height:38px;background:#0284c7;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-title{font-size:14px;font-weight:700;color:#fff}
.sb-sub{font-size:11px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-sec{font-size:10px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.08em;padding:12px 16px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;color:#94a3b8;background:none;border:none;width:calc(100% - 16px);margin:1px 8px;text-align:left;transition:all .15s}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-btn.on{background:#0284c7;color:#fff;box-shadow:0 3px 10px rgba(2,132,199,.3)}
.nav-icon{width:18px;text-align:center;flex-shrink:0;font-size:15px}
.sb-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px}
.sb-av{width:32px;height:32px;border-radius:50%;background:#0369a1;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-un{font-size:13px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-ro{font-size:11px;color:#475569}
.sb-out{background:none;border:none;cursor:pointer;color:#475569;padding:4px 8px;border-radius:6px;font-size:16px;margin-left:auto}
.sb-out:hover{color:#f87171}

/* Topbar */
#menu-btn{background:none;border:none;cursor:pointer;color:#64748b;font-size:20px;padding:4px 8px;border-radius:8px;line-height:1}
#page-h{font-weight:700;font-size:17px;flex:1}
.tb-btn{width:36px;height:36px;border-radius:10px;background:#f1f5f9;border:none;cursor:pointer;color:#64748b;font-size:15px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.tb-btn:hover{background:#e2e8f0}
.ndot{position:absolute;top:7px;right:8px;width:6px;height:6px;background:#ef4444;border-radius:50%;border:1.5px solid #fff}

/* Cards */
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sc{background:#fff;border-radius:14px;padding:16px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sc:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:background .15s;white-space:nowrap}
.bp{background:#0284c7;color:#fff}.bp:hover{background:#0369a1}
.bs{background:#f1f5f9;color:#374151}.bs:hover{background:#e2e8f0}
.bg{background:#10b981;color:#fff}.bg:hover{background:#059669}
.br{background:#ef4444;color:#fff}.br:hover{background:#dc2626}
.bsm{padding:5px 10px;font-size:12px;border-radius:8px}

/* Form */
.lbl{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:5px}
.fld{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;color:#1e293b;font-size:14px;outline:none;transition:border .15s}
.fld:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.1)}
.ebox{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:10px;font-size:13px;display:none}

/* Badge */
.bdg{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bng{background:#d1fae5;color:#065f46}
.bnr{background:#fee2e2;color:#991b1b}
.bnb{background:#dbeafe;color:#1e40af}
.bna{background:#fef3c7;color:#92400e}
.bnx{background:#f1f5f9;color:#475569}
.bnp{background:#ede9fe;color:#5b21b6}

/* Table */
.tw{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.tt{padding:14px 16px;border-bottom:1px solid #f1f5f9;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:space-between}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:9px 14px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;text-align:left;white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-top:1px solid #f1f5f9}
tr:hover td{background:#fafafa}
.ts{overflow-x:auto}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
.mb{background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9}
.mh h3{font-weight:700;font-size:16px}
.mx{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:18px;padding:2px 6px;border-radius:6px;line-height:1}
.mx:hover{color:#374151;background:#f1f5f9}
.mp{padding:20px}

/* Toast */
#tst{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.tsi{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;color:#fff;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:200px;transition:opacity .3s}
.tsi.fade{opacity:0}

/* Misc */
.spin{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#0284c7;border-radius:50%;animation:sp .7s linear infinite;margin:60px auto;display:block}
@keyframes sp{to{transform:rotate(360deg)}}
.pg{animation:pi .2s ease}
@keyframes pi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.row{display:flex;align-items:center}
.sb{justify-content:space-between}
.g2{gap:8px}.g3{gap:12px}
.g2d{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3d{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4d{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.fc{grid-column:1/-1}
.sy>*+*{margin-top:14px}
.sy2>*+*{margin-top:20px}
.mt{margin-top:16px}
.pb{background:#f1f5f9;border-radius:99px;height:8px;overflow:hidden}
.pf{height:100%;border-radius:99px}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.w100{width:100%}
.tc{text-align:center}
.tr{text-align:right}
.tm{color:#64748b;font-size:13px}
.fw{font-weight:700}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.overlay.open{display:block}

/* Login */
#lp{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#0c4a6e 100%);padding:16px}
.lc{background:#fff;border-radius:22px;padding:28px;width:100%;max-width:400px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.ltabs{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;margin-bottom:20px;gap:2px}
.lt{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:#64748b;transition:all .2s}
.lt.on{background:#fff;color:#0284c7;box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* Mobile */
@media(max-width:767px){
  #sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  .g4d{grid-template-columns:1fr 1fr}
  .g3d{grid-template-columns:1fr 1fr}
  .g2d{grid-template-columns:1fr 1fr}
}
@media(min-width:768px){
  #app{display:flex!important}
  #menu-btn{display:none}
  #sidebar{transform:none!important}
}
</style>
</head>
<body>

<div id="tst"></div>

<!-- LOGIN -->
<div id="lp">
<div class="lc">
  <div class="tc" style="margin-bottom:22px">
    <div style="width:52px;height:52px;background:#0284c7;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 6px 20px rgba(2,132,199,.35);font-size:24px">🏥</div>
    <h1 style="font-size:22px;font-weight:800">MediCore HMS</h1>
    <p class="tm" style="margin-top:3px">Hospital Management System</p>
  </div>
  <div class="ltabs">
    <button class="lt on" id="tab-in">Sign In</button>
    <button class="lt" id="tab-reg">Register Hospital</button>
  </div>

  <!-- Sign In -->
  <div id="fi" class="sy">
    <div>
      <label class="lbl">Email</label>
      <input id="si-em" class="fld" type="email" value="" placeholder="admin@hospital.com">
    </div>
    <div>
      <label class="lbl">Password</label>
      <input id="si-pw" class="fld" type="password" value="" placeholder="••••••••">
    </div>
    <div id="si-er" class="ebox"></div>
    <button id="btn-li" class="btn bp w100" style="justify-content:center;padding:11px;margin-top:4px">🔑 Sign In</button>
    <div style="background:#fef3c7;border-radius:10px;padding:10px 14px;font-size:12px;color:#92400e">
      ℹ️ Enter your registered email & password
    </div>
  </div>

  <!-- Register -->
  <div id="fr" style="display:none" class="sy">
    <div>
      <label class="lbl">Hospital Name *</label>
      <input id="rg-ho" class="fld" placeholder="City General Hospital">
    </div>
    <div class="g2d">
      <div>
        <label class="lbl">Your Name *</label>
        <input id="rg-na" class="fld" placeholder="Dr. Name">
      </div>
      <div>
        <label class="lbl">Phone</label>
        <input id="rg-ph" class="fld" type="tel" placeholder="+91 98765">
      </div>
    </div>
    <div>
      <label class="lbl">Email *</label>
      <input id="rg-em" class="fld" type="email" placeholder="admin@hospital.com">
    </div>
    <div>
      <label class="lbl">Password *</label>
      <input id="rg-pw" class="fld" type="password" placeholder="Min 8 characters">
    </div>
    <div id="rg-er" class="ebox"></div>
    <button id="btn-rg" class="btn bp w100" style="justify-content:center;padding:11px;margin-top:4px">🏥 Register Hospital</button>
  </div>
</div>
</div>

<!-- APP -->
<div id="app">
  <aside id="sidebar">
    <div class="sb-top">
      <div class="sb-icon">🏥</div>
      <div style="min-width:0">
        <div class="sb-title">MediCore HMS</div>
        <div class="sb-sub" id="sb-hn">Hospital</div>
      </div>
    </div>
    <nav style="padding:8px">
      <div class="sb-sec">Main</div>
      <button class="nav-btn" data-p="dashboard"><span class="nav-icon">📊</span>Dashboard</button>
      <button class="nav-btn" data-p="patients"><span class="nav-icon">👥</span>Patients</button>
      <button class="nav-btn" data-p="doctors"><span class="nav-icon">👨‍⚕️</span>Doctors</button>
      <button class="nav-btn" data-p="appointments"><span class="nav-icon">📅</span>Appointments</button>
      <div class="sb-sec">Clinical</div>
      <button class="nav-btn" data-p="opd"><span class="nav-icon">🩺</span>OPD</button>
      <button class="nav-btn" data-p="ipd"><span class="nav-icon">🛏️</span>IPD / Wards</button>
      <button class="nav-btn" data-p="laboratory"><span class="nav-icon">🧪</span>Laboratory</button>
      <div class="sb-sec">Admin</div>
      <button class="nav-btn" data-p="billing"><span class="nav-icon">🧾</span>Billing</button>
      <button class="nav-btn" data-p="staff"><span class="nav-icon">🪪</span>Staff</button>
      <button class="nav-btn" data-p="inventory"><span class="nav-icon">📦</span>Inventory</button>
      <button class="nav-btn" data-p="reports"><span class="nav-icon">📈</span>Reports</button>
      <button class="nav-btn" data-p="settings"><span class="nav-icon">⚙️</span>Settings</button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="sb-av" id="sb-av">D</div>
        <div style="flex:1;min-width:0">
          <div class="sb-un" id="sb-un">Admin</div>
          <div class="sb-ro" id="sb-ro">Hospital Admin</div>
        </div>
        <button class="sb-out" id="btn-lo" title="Logout">🚪</button>
      </div>
    </div>
  </aside>
  <div class="overlay" id="ov"></div>

  <div id="main-wrap">
    <div id="topbar">
      <button id="menu-btn">☰</button>
      <span id="page-h">Dashboard</span>
      <button class="tb-btn" id="btn-dk">🌙</button>
      <div class="tb-btn">🔔<span class="ndot"></span></div>
    </div>
    <div id="content"><div class="spin"></div></div>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
var S = { user:null, hospital:null, dark: localStorage.getItem('dk')==='1' };

// ── API CONFIG ── Apna EC2 IP yahan lagao ─────────────
var API_URL = 'https://web-production-d347.up.railway.app/api';
// Railway deployment URL
var API_ON = API_URL.indexOf('YOUR_EC2') === -1;
function api(method, path, body){
  return fetch(API_URL+path,{method:method,
    headers:{'Content-Type':'application/json','Authorization':S.user&&S.user.token?'Bearer '+S.user.token:''},
    body:body?JSON.stringify(body):undefined
  }).then(function(r){
    if(!r.ok) return r.json().then(function(e){throw new Error(e.message||'API Error');});
    return r.json();
  });
}

var DATA = { patients:[], doctors:[], appts:[], bills:[] };

// Helpers
function ge(id){ return document.getElementById(id); }
function cur(v){ return '\u20B9'+(v||0).toLocaleString('en-IN'); }

function toast(msg,t){
  var c={s:'#10b981',e:'#ef4444',i:'#0284c7',w:'#f59e0b'};
  var ic={s:'✅',e:'❌',i:'ℹ️',w:'⚠️'};
  var k=t||'s';
  var d=document.createElement('div');
  d.className='tsi';
  d.style.background=c[k]||c.s;
  d.textContent=(ic[k]||ic.s)+' '+msg;
  ge('tst').appendChild(d);
  setTimeout(function(){d.classList.add('fade');},2800);
  setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},3200);
}

function openM(id){ var m=ge(id); if(m)m.classList.add('open'); }
function closeM(id){ var m=ge(id); if(m)m.classList.remove('open'); }

function applyDark(){
  document.body.style.background = S.dark?'#0f172a':'';
  document.body.style.color = S.dark?'#f1f5f9':'';
  var dk=ge('btn-dk'); if(dk)dk.textContent=S.dark?'☀️':'🌙';
  var ct=ge('content'); if(ct)ct.style.background=S.dark?'#0f172a':'#f1f5f9';
}

// AUTH
function doLogin(){
  var em=(ge('si-em').value||'').trim();
  var pw=ge('si-pw').value||'';
  var er=ge('si-er');
  er.style.display='none';
  if(!em||!pw){ er.textContent='Enter email and password'; er.style.display=''; return; }

  // Real API login
  if(API_ON){
    var btn=ge('btn-li');
    btn.textContent='⏳ Signing in...'; btn.disabled=true;
    api('POST','/auth/login',{email:em,password:pw})
      .then(function(res){
        S.user=Object.assign(res.user,{token:res.token});
        S.hospital=res.hospital;
        try{localStorage.setItem('hs',JSON.stringify({u:S.user,h:S.hospital}));}catch(x){}
        launchApp();
        toast('Welcome back, '+res.user.name+'!','s');
      })
      .catch(function(err){
        er.textContent=err.message||'Login failed';
        er.style.display='';
      })
      .finally(function(){btn.textContent='🔑 Sign In'; btn.disabled=false;});
    return;
  }

  // No demo mode - real backend only
  er.textContent='Backend not configured. Please set API_URL.';
  er.style.display='';
}

function doRegister(){
  var na=(ge('rg-na').value||'').trim();
  var ho=(ge('rg-ho').value||'').trim();
  var em=(ge('rg-em').value||'').trim();
  var pw=ge('rg-pw').value||'';
  var er=ge('rg-er');
  er.style.display='none';
  if(!na||!ho||!em||!pw){ er.textContent='All fields required'; er.style.display=''; return; }
  var btn=ge('btn-rg');
  btn.textContent='⏳ Registering...'; btn.disabled=true;
  api('POST','/auth/register',{name:na,hospitalName:ho,email:em,password:pw,role:'hospital_admin'})
    .then(function(res){
      S.user=Object.assign(res.user,{token:res.token});
      S.hospital=res.hospital;
      try{localStorage.setItem('hs',JSON.stringify({u:S.user,h:S.hospital}));}catch(x){}
      launchApp();
      toast('Hospital registered! Welcome, '+res.user.name+'!','s');
    })
    .catch(function(err){
      er.textContent=err.message||'Registration failed';
      er.style.display='';
    })
    .finally(function(){btn.textContent='🏥 Register Hospital'; btn.disabled=false;});
}

function doLogout(){
  try{localStorage.removeItem('hs');}catch(x){}
  S.user=null; S.hospital=null;
  ge('app').style.display='none';
  ge('lp').style.display='flex';
}

function launchApp(){
  ge('lp').style.display='none';
  ge('app').style.display='flex';
  if(S.user){
    ge('sb-un').textContent=S.user.name;
    ge('sb-ro').textContent=(S.user.role||'').replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
    ge('sb-av').textContent=S.user.name[0].toUpperCase();
  }
  if(S.hospital) ge('sb-hn').textContent=S.hospital.name;
  showPage('dashboard');
}

// SIDEBAR
function toggleSB(){
  ge('sidebar').classList.toggle('open');
  ge('ov').classList.toggle('open');
}
function closeSB(){
  ge('sidebar').classList.remove('open');
  ge('ov').classList.remove('open');
}

// ROUTER
var PG={};
function reg(n,f){ PG[n]=f; }

var PT={dashboard:'Dashboard',patients:'Patients',doctors:'Doctors',appointments:'Appointments',
  opd:'OPD Consultation',ipd:'IPD / Wards',laboratory:'Laboratory',billing:'Billing',
  staff:'Staff',inventory:'Inventory',reports:'Reports',settings:'Settings'};

function showPage(name){
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.classList.toggle('on',b.dataset.p===name);
  });
  ge('page-h').textContent=PT[name]||name;
  ge('content').innerHTML='<div class="spin"></div>';
  if(PG[name]) PG[name]();
  else ge('content').innerHTML='<div class="tc" style="padding:60px;color:#94a3b8"><p style="font-size:36px">🔧</p><p style="margin-top:8px">Coming soon</p></div>';
  if(window.innerWidth<768) closeSB();
}

// STAT CARD
function sc(label,val,icon,color,bg,sub){
  return '<div class="sc"><div class="row sb"><div>'+
    '<p style="font-size:12px;color:#64748b;margin-bottom:5px">'+label+'</p>'+
    '<p style="font-size:22px;font-weight:800;color:'+color+'">'+val+'</p>'+
    '<p style="font-size:11px;color:#94a3b8;margin-top:2px">'+sub+'</p></div>'+
    '<div style="width:40px;height:40px;background:'+bg+';border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+icon+'</div>'+
    '</div></div>';
}

// DASHBOARD
reg('dashboard',function(){
  var h=new Date().getHours();
  var g=h<12?'Morning':h<17?'Afternoon':'Evening';
  var n=(S.user&&S.user.name)||'Doctor';
  var rows='';
  DATA.appts.forEach(function(a){

    '<div class="g2d">'+

      });
    });
  }
  wireViewBtns();
});

document.addEventListener('DOMContentLoaded',function(){
  applyDark();

  // Login tab switch
  ge('tab-in').addEventListener('click',function(){
    ge('fi').style.display=''; ge('fr').style.display='none';
    ge('tab-in').classList.add('on'); ge('tab-reg').classList.remove('on');
  });
  ge('tab-reg').addEventListener('click',function(){
    ge('fr').style.display=''; ge('fi').style.display='none';
    ge('tab-reg').classList.add('on'); ge('tab-in').classList.remove('on');
  });

  // Login / Register
  ge('btn-li').addEventListener('click',doLogin);
  ge('btn-rg').addEventListener('click',doRegister);
  ge('si-pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  ge('rg-pw').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister();});

  // Nav
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.addEventListener('click',function(){if(b.dataset.p)showPage(b.dataset.p);});
  });

  // Logout
  ge('btn-lo').addEventListener('click',doLogout);

  // Sidebar toggle
  ge('menu-btn').addEventListener('click',toggleSB);
  ge('ov').addEventListener('click',closeSB);

  // Dark mode
  ge('btn-dk').addEventListener('click',function(){
    S.dark=!S.dark;
    try{localStorage.setItem('dk',S.dark?'1':'0');}catch(x){}
    applyDark();
  });
