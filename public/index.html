<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCore HMS</title><style>

body{
font-family:system-ui;
margin:0;
background:#f1f5f9;
color:#0f172a;
}

header{
background:#0f172a;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:700;
}

.container{
padding:16px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
margin-bottom:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#0284c7;
color:white;
font-weight:600;
}

button:hover{
background:#0369a1;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f8fafc;
font-size:12px;
}

@media(max-width:768px){

table{
font-size:12px;
}

}

</style></head><body><header>
<span>🏥 MediCore HMS</span>
<span id="status">Connecting...</span>
</header><div class="container"><div class="card"><h3>Add Patient</h3><input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age" type="number"><select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select><input id="phone" placeholder="Phone"><button onclick="addPatient()">Save Patient</button>

</div><div class="card"><h3>Patients</h3><table>
<thead>
<tr>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
</tr>
</thead><tbody id="patients"></tbody></table></div></div><script>

const API = "https://web-production-d347.up.railway.app/api"

async function loadPatients(){

try{

const res = await fetch(API+"/patients")
const data = await res.json()

document.getElementById("status").innerText="Connected"

const table=document.getElementById("patients")

table.innerHTML=""

data.patients.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.age}</td>
<td>${p.gender}</td>
<td>${p.phone}</td>
</tr>
`

})

}catch(e){

document.getElementById("status").innerText="Server Offline"

}

}

async function addPatient(){

const body={
name:document.getElementById("name").value,
age:document.getElementById("age").value,
gender:document.getElementById("gender").value,
phone:document.getElementById("phone").value
}

await fetch(API+"/patients",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(body)

})

alert("Patient Added")

loadPatients()

}

loadPatients()

</script></body>
</html>
